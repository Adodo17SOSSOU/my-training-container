name: Build and Push to GHCR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: Adodo17SOSSOU
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ghcr.io/Adodo17SOSSOU/pytorch-jz:latest .
          docker push ghcr.io/Adodo17SOSSOU/pytorch-jz:latest
