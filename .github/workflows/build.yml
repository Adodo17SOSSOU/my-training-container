name: Build and Push to GHCR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.4  # Version plus récente et stable

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.1.0  # Version plus récente et stable

        with:
          registry: ghcr.io
          username: Adodo17SOSSOU
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ghcr.io/Adodo17SOSSOU/pytorch-jz:latest .
          docker push ghcr.io/Adodo17SOSSOU/pytorch-jz:latest
